<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #161616;
      --border: #1c1c1c;
      --border-hover: #2e2e2e;
      --text-primary: #e8e8e8;
      --text-secondary: #888;
      --text-muted: #444;
      --accent: #c8ff00;
      --red: #ff4d4d;
      --yellow: #f5a623;
    }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 56px 24px 80px;
    }
    header {
      max-width: 760px;
      margin: 0 auto 48px;
    }
    .header-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    header h1 {
      font-size: 36px;
      font-weight: 200;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.1;
    }
    header h1 span { color: var(--accent); }

    .main { max-width: 760px; margin: 0 auto; }

    /* Add form */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 32px;
    }
    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .form-row:last-child { margin-bottom: 0; }
    input, textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }
    input:focus, textarea:focus, select:focus { border-color: var(--border-hover); }
    textarea { resize: vertical; min-height: 64px; }
    select option { background: #1a1a1a; }
    .form-row input.title-input { flex: 1; }
    .btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #000;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 10px 20px;
      text-transform: uppercase;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text-primary); opacity: 1; }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.1em;
      padding: 6px 14px;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); }

    /* Task list */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label .count {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 9px;
      padding: 1px 7px;
      color: var(--text-secondary);
    }

    .task-group { margin-bottom: 32px; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.15s;
      cursor: default;
    }
    .task-item:hover { border-color: var(--border-hover); }
    .task-item.done { opacity: 0.45; }

    .checkbox {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border-hover);
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .checkbox:hover { border-color: var(--accent); }
    .checkbox.checked { background: var(--accent); border-color: var(--accent); }
    .checkbox.checked::after {
      content: '';
      width: 10px;
      height: 6px;
      border-left: 2px solid #000;
      border-bottom: 2px solid #000;
      transform: rotate(-45deg) translateY(-1px);
    }

    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.4;
    }
    .task-item.done .task-title { text-decoration: line-through; color: var(--text-secondary); }
    .task-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
      line-height: 1.5;
    }
    .task-meta {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid;
    }
    .tag.high { color: var(--red); border-color: rgba(255,77,77,0.3); }
    .tag.medium { color: var(--yellow); border-color: rgba(245,166,35,0.3); }
    .tag.low { color: var(--text-muted); border-color: var(--border); }
    .tag.due { color: var(--text-secondary); border-color: var(--border); }
    .tag.overdue { color: var(--red); border-color: rgba(255,77,77,0.3); }

    .task-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s;
      line-height: 1;
    }
    .icon-btn:hover { color: var(--text-secondary); }
    .icon-btn.delete:hover { color: var(--red); }

    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border-hover);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
      padding: 12px 18px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: all 0.2s;
      z-index: 100;
    }
    .toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

    /* Loading */
    .loading { color: var(--text-muted); font-size: 13px; padding: 24px 0; }

    @media (max-width: 480px) {
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-label">underground-radar / tasks</div>
    <h1>task <span>manager</span></h1>
  </header>

  <div class="main">
    <div class="add-form">
      <div class="form-row">
        <input id="titleInput" class="title-input" type="text" placeholder="new task..." autocomplete="off"/>
      </div>
      <div class="form-row">
        <textarea id="descInput" placeholder="description (optional)"></textarea>
      </div>
      <div class="form-row">
        <select id="priorityInput">
          <option value="medium">priority: medium</option>
          <option value="high">priority: high</option>
          <option value="low">priority: low</option>
        </select>
        <input id="dueDateInput" type="date" style="max-width:180px"/>
        <button class="btn" onclick="addTask()">add</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">all</button>
      <button class="filter-btn" onclick="setFilter('todo', this)">to do</button>
      <button class="filter-btn" onclick="setFilter('done', this)">done</button>
      <button class="filter-btn" onclick="setFilter('high', this)">high priority</button>
    </div>

    <div id="taskList"><div class="loading">loading tasks...</div></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var tasks = [];
    var currentFilter = 'all';

    async function loadTasks() {
      try {
        var res = await fetch('/api/tasks');
        tasks = await res.json();
        render();
      } catch(e) {
        document.getElementById('taskList').innerHTML = '<div class="empty">Could not load tasks.</div>';
      }
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      render();
    }

    function getFiltered() {
      return tasks.filter(function(t) {
        if (currentFilter === 'todo') return t.status !== 'done';
        if (currentFilter === 'done') return t.status === 'done';
        if (currentFilter === 'high') return t.priority === 'high' && t.status !== 'done';
        return true;
      });
    }

    function formatDate(d) {
      if (!d) return null;
      var parts = d.split('T')[0].split('-');
      return parts[2] + '/' + parts[1] + '/' + parts[0].slice(2);
    }

    function isOverdue(t) {
      if (!t.due_date || t.status === 'done') return false;
      return new Date(t.due_date) < new Date(new Date().toDateString());
    }

    function render() {
      var filtered = getFiltered();
      var todo = filtered.filter(function(t) { return t.status !== 'done'; });
      var done = filtered.filter(function(t) { return t.status === 'done'; });

      var html = '';

      if (todo.length === 0 && done.length === 0) {
        html = '<div class="empty">no tasks</div>';
      } else {
        if (todo.length > 0) {
          html += renderGroup('pending', todo);
        }
        if (done.length > 0) {
          html += renderGroup('done', done);
        }
      }

      document.getElementById('taskList').innerHTML = html;
    }

    function renderGroup(label, items) {
      var html = '<div class="task-group">';
      html += '<div class="section-label">' + label + ' <span class="count">' + items.length + '</span></div>';
      items.forEach(function(t) {
        var isDone = t.status === 'done';
        var overdue = isOverdue(t);
        html += '<div class="task-item' + (isDone ? ' done' : '') + '">';
        html += '<div class="checkbox' + (isDone ? ' checked' : '') + '" onclick="toggleDone(\'' + t.id + '\', ' + isDone + ')"></div>';
        html += '<div class="task-body">';
        html += '<div class="task-title">' + escHtml(t.title) + '</div>';
        if (t.description) html += '<div class="task-desc">' + escHtml(t.description) + '</div>';
        html += '<div class="task-meta">';
        if (t.priority !== 'medium') html += '<span class="tag ' + t.priority + '">' + t.priority + '</span>';
        if (t.due_date) {
          html += '<span class="tag ' + (overdue ? 'overdue' : 'due') + '">' + (overdue ? 'overdue · ' : '') + formatDate(t.due_date) + '</span>';
        }
        html += '</div></div>';
        html += '<div class="task-actions">';
        html += '<button class="icon-btn delete" onclick="deleteTask(\'' + t.id + '\')" title="delete">✕</button>';
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function addTask() {
      var title = document.getElementById('titleInput').value.trim();
      if (!title) { toast('enter a task title'); return; }
      var body = {
        title: title,
        description: document.getElementById('descInput').value.trim() || null,
        priority: document.getElementById('priorityInput').value,
        due_date: document.getElementById('dueDateInput').value || null
      };
      try {
        var res = await fetch('/api/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        var task = await res.json();
        if (task.error) throw new Error(task.error);
        tasks.unshift(task);
        document.getElementById('titleInput').value = '';
        document.getElementById('descInput').value = '';
        document.getElementById('dueDateInput').value = '';
        document.getElementById('priorityInput').value = 'medium';
        render();
        toast('task added');
      } catch(e) {
        toast('error: ' + e.message);
      }
    }

    async function toggleDone(id, wasDone) {
      var status = wasDone ? 'todo' : 'done';
      try {
        var res = await fetch('/api/tasks/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: status })
        });
        var updated = await res.json();
        tasks = tasks.map(function(t) { return t.id === id ? updated : t; });
        render();
      } catch(e) {
        toast('error updating task');
      }
    }

    async function deleteTask(id) {
      try {
        await fetch('/api/tasks/' + id, { method: 'DELETE' });
        tasks = tasks.filter(function(t) { return t.id !== id; });
        render();
        toast('task deleted');
      } catch(e) {
        toast('error deleting task');
      }
    }

    function toast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(function() { el.classList.remove('show'); }, 2500);
    }

    document.getElementById('titleInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>
</body>
</html>
